name: sirdaba_delivery
description: SirDaba Delivery App
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.16.3
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  permission_handler: ^11.3.1
  geolocator: ^11.0.0
  url_launcher: ^6.2.4
  image_picker: ^1.0.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
